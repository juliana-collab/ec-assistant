<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Assistant · Edit Crew</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f8f6; --surface: #ffffff; --border: #e4e2dc; --border-strong: #c8c5bc;
  --text: #1a1a18; --text-muted: #6b6b67; --text-hint: #9b9b96; --accent: #1a1a2e;
  --danger-bg: #fef2f2; --danger-border: #fca5a5; --danger-text: #991b1b;
  --warning-bg: #fffbeb; --warning-border: #fcd34d; --warning-text: #92400e;
  --success-bg: #f0fdf4; --success-border: #86efac; --success-text: #166534;
  --info-bg: #eff6ff; --info-border: #93c5fd; --info-text: #1e40af;
  --radius: 10px; --radius-sm: 6px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
.container { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 1rem; }
.header { display: flex; align-items: center; gap: 12px; padding: 0 0 0.5rem; }
.logo { width: 38px; height: 38px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: #fff; }
.title { font-size: 16px; font-weight: 600; }
.subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; display: flex; flex-direction: column; gap: 12px; }
.label { font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.07em; }
textarea { width: 100%; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; color: var(--text); background: var(--bg); resize: vertical; min-height: 120px; font-family: inherit; line-height: 1.6; }
textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.btn-primary { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; font-family: inherit; transition: opacity 0.15s; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }
.btn-ghost:hover { background: var(--bg); }
.source-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--bg); border: 0.5px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--text-muted); }
.response-text { font-size: 14px; color: var(--text); line-height: 1.75; white-space: pre-wrap; }
.banner { border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; }
.banner-danger { background: var(--danger-bg); border: 0.5px solid var(--danger-border); }
.banner-warning { background: var(--warning-bg); border: 0.5px solid var(--warning-border); }
.banner-success { background: var(--success-bg); border: 0.5px solid var(--success-border); }
.banner-info { background: var(--info-bg); border: 0.5px solid var(--info-border); }
.banner-icon { font-size: 18px; flex-shrink: 0; }
.banner-body { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.banner-title { font-size: 13px; font-weight: 700; }
.banner-title.danger { color: var(--danger-text); }
.banner-title.warning { color: var(--warning-text); }
.banner-title.success { color: var(--success-text); }
.banner-title.info { color: var(--info-text); }
.steps-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.steps-list li { font-size: 13px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; padding: 6px 10px; border-radius: var(--radius-sm); }
.steps-list li.danger { color: var(--danger-text); background: rgba(254,226,226,0.5); }
.steps-list li.warning { color: var(--warning-text); background: rgba(254,243,199,0.5); }
.steps-list li.info { color: var(--info-text); background: rgba(219,234,254,0.5); }
.steps-list li::before { content: "→"; font-weight: 700; flex-shrink: 0; }
.banner-desc { font-size: 11px; margin-top: 2px; opacity: 0.75; }
.banner-desc.danger { color: var(--danger-text); }
.banner-desc.warning { color: var(--warning-text); }
.actions-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding-top: 4px; border-top: 0.5px solid var(--border); }
.spinner-dark { width: 15px; height: 15px; border: 2px solid var(--border-strong); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-row { display: flex; align-items: center; gap: 10px; padding: 0.5rem 0; }
.hidden { display: none !important; }
.sop-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--info-bg); border: 0.5px solid var(--info-border); border-radius: 20px; padding: 2px 10px; font-size: 11px; color: var(--info-text); margin-right: 4px; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">EC</div>
    <div>
      <div class="title">PM Assistant</div>
      <div class="subtitle">Edit Crew · Claude + SOP Bible</div>
    </div>
  </div>

  <div class="card">
    <div class="label">Mensaje del cliente</div>
    <textarea id="ticket-input" placeholder="Pega aquí el mensaje del cliente..."></textarea>
    <div style="display: flex; justify-content: flex-end;">
      <button class="btn-primary" id="analyze-btn" onclick="analyzeTicket()">✦ Analizar y sugerir respuesta</button>
    </div>
  </div>

  <div class="card hidden" id="loading-card">
    <div class="loading-row">
      <div class="spinner-dark"></div>
      <span style="font-size:13px; color: var(--text-muted);" id="loading-text">Analizando el mensaje...</span>
    </div>
  </div>

  <div class="hidden" id="result-section" style="display:flex; flex-direction:column; gap:10px;">

    <!-- Status + action steps -->
    <div class="hidden" id="status-banner"></div>

    <!-- SOPs referenced -->
    <div class="hidden" id="sop-banner"></div>

    <!-- Suggested response -->
    <div class="card hidden" id="response-card" style="gap:14px;">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
        <div class="label">Respuesta sugerida</div>
      </div>
      <div class="response-text" id="response-text"></div>
      <div class="actions-row">
        <button class="btn-primary" onclick="copyResponse()" id="copy-btn">Copiar respuesta</button>
        <button class="btn-ghost" onclick="resetPanel()">↺ Nuevo ticket</button>
      </div>
    </div>

  </div>

</div>
<script>
const LOADING = [
  "Analizando el mensaje...",
  "Consultando SOP Bible...",
  "Evaluando nivel de riesgo...",
  "Generando recomendación..."
];

const HIGH_ESC = [
  "raising this with juliana","raising with juliana","escalating","cancel","refund","devolver","reembolso",
  "lawyer","abogado","legal","publicly","social media","redes sociales","contract","contrato",
  "done with","fed up","had enough","this is unacceptable","not what was promised","said repeatedly",
  "directly","incompetent","terrible","worst","never again","going elsewhere","i want out"
];

const MED_ESC = [
  "frustrated","disappointed","waiting too long","no response","ignored","weeks","not good enough",
  "expected more","promised","communication","execution","match what was promised","very unhappy"
];

function getEscLevel(t) {
  t = t.toLowerCase();
  const highFlags = HIGH_ESC.filter(k => t.includes(k));
  const medFlags = MED_ESC.filter(k => t.includes(k));
  if (highFlags.length > 0) return { level: "high", flags: highFlags };
  if (medFlags.length >= 2) return { level: "high", flags: medFlags };
  if (medFlags.length > 0) return { level: "medium", flags: medFlags };
  return { level: "low", flags: [] };
}

let loadingTimer;

async function analyzeTicket() {
  const ticket = document.getElementById('ticket-input').value.trim();
  if (!ticket) { alert('Pega el mensaje del cliente primero.'); return; }

  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('result-section').classList.add('hidden');
  document.getElementById('loading-card').classList.remove('hidden');

  let s = 0;
  loadingTimer = setInterval(() => {
    s = (s+1) % LOADING.length;
    document.getElementById('loading-text').textContent = LOADING[s];
  }, 1400);

  const esc = getEscLevel(ticket);

  const system = `Eres el asistente interno de Edit Crew, una agencia de edición de video premium. Ayudas a los Project Managers a manejar tickets de clientes.

Tu tarea es analizar el mensaje del cliente y devolver un JSON con esta estructura exacta (sin markdown, sin backticks, solo JSON puro):

{
  "sops": ["nombre del SOP 1 relevante", "nombre del SOP 2 relevante"],
  "checklist": ["paso concreto a revisar antes de responder 1", "paso 2", "paso 3"],
  "response": "respuesta lista para enviar al cliente en inglés"
}

Reglas para "sops": nombres de procesos de una SOP Bible de agencia de video (revisiones, entregas, cancelaciones, calidad, comunicación, onboarding, escalación). Pon los más relevantes al mensaje.

Reglas para "checklist": pasos MUY concretos que el PM debe verificar o hacer ANTES de responder. Basados en buenas prácticas de CS. Máximo 4 pasos. Ejemplos: "Revisa el historial de revisiones de este cliente en ClickUp", "Confirma con el editor el status actual del video", "Verifica cuántas revisiones le quedan según su paquete".

Reglas para "response":
- En inglés siempre
- Primera persona (I, we) — nunca mencionar al PM en tercera persona  
- Empático, cálido, profesional
- Máximo 80 palabras
- Firma: The Edit Crew Team
- Si es alto riesgo: solo validar y prometer seguimiento inmediato, nada más
- Solo el texto del mensaje, sin explicaciones`;

  try {
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 600,
        system,
        messages: [{ role: "user", content: `Mensaje del cliente:\n"${ticket}"` }]
      })
    });

    const data = await res.json();
    clearInterval(loadingTimer);
    document.getElementById('loading-card').classList.add('hidden');

    if (data.error) {
      alert("Error: " + (data.error.message || JSON.stringify(data.error)));
      document.getElementById('analyze-btn').disabled = false;
      return;
    }

    let parsed;
    try {
      const raw = data.content?.[0]?.text || "{}";
      parsed = JSON.parse(raw.replace(/```json|```/g, "").trim());
    } catch(e) {
      parsed = { sops: [], checklist: [], response: data.content?.[0]?.text || "Sin respuesta." };
    }

    // Status banner
    const sb = document.getElementById('status-banner');
    if (esc.level === "high") {
      sb.className = 'banner banner-danger';
      sb.classList.remove('hidden');
      const checklistHTML = (parsed.checklist || []).map(s => `<li class="danger">${s}</li>`).join('');
      sb.innerHTML = `
        <div class="banner-icon">🚨</div>
        <div class="banner-body">
          <div class="banner-title danger">Escala con Juli antes de responder</div>
          <ul class="steps-list">${checklistHTML}<li class="danger">Notifica a Juli directamente — no envíes nada sin su visto bueno</li></ul>
          <div class="banner-desc danger">Señales detectadas: ${esc.flags.join(', ')}</div>
        </div>`;
    } else if (esc.level === "medium") {
      sb.className = 'banner banner-warning';
      sb.classList.remove('hidden');
      const checklistHTML = (parsed.checklist || []).map(s => `<li class="warning">${s}</li>`).join('');
      sb.innerHTML = `
        <div class="banner-icon">⚠️</div>
        <div class="banner-body">
          <div class="banner-title warning">Revisa estos puntos antes de enviar</div>
          <ul class="steps-list">${checklistHTML}</ul>
          <div class="banner-desc warning">Señales: ${esc.flags.join(', ')}</div>
        </div>`;
    } else {
      sb.className = 'banner banner-success';
      sb.classList.remove('hidden');
      const checklistHTML = (parsed.checklist || []).map(s => `<li class="info">${s}</li>`).join('');
      sb.innerHTML = `
        <div class="banner-icon">✓</div>
        <div class="banner-body">
          <div class="banner-title success">Sin señales de riesgo</div>
          ${parsed.checklist?.length ? `<ul class="steps-list">${checklistHTML}</ul>` : ''}
        </div>`;
    }

    // SOPs banner
    if (parsed.sops && parsed.sops.length > 0) {
      const sopBanner = document.getElementById('sop-banner');
      sopBanner.className = 'banner banner-info';
      sopBanner.classList.remove('hidden');
      const chipsHTML = parsed.sops.map(s => `<span class="sop-chip">📄 ${s}</span>`).join('');
      sopBanner.innerHTML = `
        <div class="banner-icon">📚</div>
        <div class="banner-body">
          <div class="banner-title info">SOPs relevantes de tu Bible</div>
          <div style="margin-top:6px;">${chipsHTML}</div>
        </div>`;
    }

    // Response
    document.getElementById('response-text').textContent = parsed.response || "";
    document.getElementById('response-card').classList.remove('hidden');
    document.getElementById('result-section').classList.remove('hidden');
    document.getElementById('analyze-btn').disabled = false;

  } catch(e) {
    clearInterval(loadingTimer);
    document.getElementById('loading-card').classList.add('hidden');
    alert("Error de conexión: " + e.message);
    document.getElementById('analyze-btn').disabled = false;
  }
}

function copyResponse() {
  navigator.clipboard.writeText(document.getElementById('response-text').textContent).then(() => {
    const b = document.getElementById('copy-btn');
    b.textContent = '✓ Copiado';
    setTimeout(() => { b.textContent = 'Copiar respuesta'; }, 2000);
  });
}

function resetPanel() {
  document.getElementById('ticket-input').value = '';
  document.getElementById('result-section').classList.add('hidden');
  document.getElementById('status-banner').classList.add('hidden');
  document.getElementById('sop-banner').classList.add('hidden');
  document.getElementById('response-card').classList.add('hidden');
}
</script>
</body>
</html>
