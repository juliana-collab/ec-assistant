<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Assistant · Edit Crew</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f8f6; --surface: #ffffff; --border: #e4e2dc; --border-strong: #c8c5bc;
  --text: #1a1a18; --text-muted: #6b6b67; --text-hint: #9b9b96; --accent: #1a1a2e;
  --danger-bg: #fef2f2; --danger-border: #fca5a5; --danger-text: #991b1b;
  --warning-bg: #fffbeb; --warning-border: #fcd34d; --warning-text: #92400e;
  --success-bg: #f0fdf4; --success-border: #86efac; --success-text: #166534;
  --info-bg: #eff6ff; --info-border: #93c5fd; --info-text: #1e40af;
  --radius: 10px; --radius-sm: 6px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
.container { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 1rem; }
.header { display: flex; align-items: center; gap: 12px; padding: 0 0 0.5rem; }
.logo { width: 38px; height: 38px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: #fff; }
.title { font-size: 16px; font-weight: 600; }
.subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

/* Tabs */
.tabs { display: flex; gap: 4px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 4px; }
.tab { flex: 1; padding: 8px 12px; font-size: 13px; font-weight: 500; border: none; border-radius: var(--radius-sm); background: transparent; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: all 0.15s; text-align: center; }
.tab.active { background: var(--accent); color: #fff; }
.tab:not(.active):hover { background: var(--bg); color: var(--text); }

.tab-panel { display: none; flex-direction: column; gap: 1rem; }
.tab-panel.active { display: flex; }

.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; display: flex; flex-direction: column; gap: 12px; }
.label { font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.07em; }
textarea { width: 100%; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; color: var(--text); background: var(--bg); resize: vertical; min-height: 120px; font-family: inherit; line-height: 1.6; }
textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 14px; color: var(--text); background: var(--bg); font-family: inherit; text-transform: uppercase; }
.input-row input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.btn-primary { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; font-family: inherit; transition: opacity 0.15s; white-space: nowrap; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }
.btn-ghost:hover { background: var(--bg); }
.response-text { font-size: 14px; color: var(--text); line-height: 1.75; white-space: pre-wrap; }
.banner { border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; }
.banner-danger { background: var(--danger-bg); border: 0.5px solid var(--danger-border); }
.banner-warning { background: var(--warning-bg); border: 0.5px solid var(--warning-border); }
.banner-success { background: var(--success-bg); border: 0.5px solid var(--success-border); }
.banner-info { background: var(--info-bg); border: 0.5px solid var(--info-border); }
.banner-icon { font-size: 18px; flex-shrink: 0; }
.banner-body { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.banner-title { font-size: 13px; font-weight: 700; }
.banner-title.danger { color: var(--danger-text); }
.banner-title.warning { color: var(--warning-text); }
.banner-title.success { color: var(--success-text); }
.banner-title.info { color: var(--info-text); }
.steps-list { list-style: none; display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
.steps-list li { font-size: 13px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; padding: 6px 10px; border-radius: var(--radius-sm); }
.steps-list li.danger { color: var(--danger-text); background: rgba(254,226,226,0.5); }
.steps-list li.warning { color: var(--warning-text); background: rgba(254,243,199,0.5); }
.steps-list li.info { color: var(--info-text); background: rgba(219,234,254,0.5); }
.steps-list li::before { content: "→"; font-weight: 700; flex-shrink: 0; }
.banner-desc { font-size: 11px; margin-top: 2px; opacity: 0.75; }
.banner-desc.danger { color: var(--danger-text); }
.banner-desc.warning { color: var(--warning-text); }
.actions-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding-top: 4px; border-top: 0.5px solid var(--border); }
.spinner-dark { width: 15px; height: 15px; border: 2px solid var(--border-strong); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-row { display: flex; align-items: center; gap: 10px; padding: 0.5rem 0; }
.hidden { display: none !important; }
.sop-link { display: inline-flex; align-items: center; gap: 5px; background: var(--info-bg); border: 0.5px solid var(--info-border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--info-text); margin-right: 6px; margin-bottom: 6px; text-decoration: none; font-weight: 500; transition: opacity 0.15s; }
.sop-link:hover { opacity: 0.75; }
.sop-link::after { content: " ↗"; font-size: 10px; opacity: 0.7; }

/* Tasks table */
.tasks-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.tasks-table th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 10px; border-bottom: 0.5px solid var(--border); }
.tasks-table td { padding: 10px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: top; }
.tasks-table tr:last-child td { border-bottom: none; }
.tasks-table tr:hover td { background: var(--bg); }
.task-link { color: var(--info-text); text-decoration: none; font-weight: 500; }
.task-link:hover { text-decoration: underline; }
.status-pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; background: var(--bg); border: 0.5px solid var(--border-strong); color: var(--text-muted); text-transform: capitalize; }
.hours-badge { font-weight: 600; color: var(--accent); }
.empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">EC</div>
    <div>
      <div class="title">PM Assistant</div>
      <div class="subtitle">Edit Crew · Claude + SOP Bible + ClickUp</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('ticket')">💬 Responder ticket</button>
    <button class="tab" onclick="switchTab('clickup')">🔍 Consultar ClickUp</button>
  </div>

  <!-- TAB 1: Ticket -->
  <div class="tab-panel active" id="panel-ticket">
    <div class="card">
      <div class="label">Mensaje del cliente</div>
      <textarea id="ticket-input" placeholder="Pega aquí el mensaje del cliente..."></textarea>
      <div style="display: flex; justify-content: flex-end;">
        <button class="btn-primary" id="analyze-btn" onclick="analyzeTicket()">✦ Analizar y sugerir respuesta</button>
      </div>
    </div>

    <div class="card hidden" id="loading-card">
      <div class="loading-row">
        <div class="spinner-dark"></div>
        <span style="font-size:13px; color: var(--text-muted);" id="loading-text">Analizando el mensaje...</span>
      </div>
    </div>

    <div class="hidden" id="result-section" style="display:flex; flex-direction:column; gap:10px;">
      <div class="hidden" id="status-banner"></div>
      <div class="hidden" id="sop-banner"></div>
      <div class="card hidden" id="response-card" style="gap:14px;">
        <div class="label">Respuesta sugerida</div>
        <div class="response-text" id="response-text"></div>
        <div class="actions-row">
          <button class="btn-primary" onclick="copyResponse()" id="copy-btn">Copiar respuesta</button>
          <button class="btn-ghost" onclick="resetTicket()">↺ Nuevo ticket</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB 2: ClickUp -->
  <div class="tab-panel" id="panel-clickup">
    <div class="card">
      <div class="label">Buscar cliente por acrónimo</div>
      <div class="input-row">
        <input type="text" id="acronym-input" placeholder="Ej: TOCS, WPR, KH..." maxlength="10" />
        <button class="btn-primary" id="search-btn" onclick="searchTasks()">🔍 Buscar en ClickUp</button>
      </div>
    </div>

    <div class="card hidden" id="cu-loading-card">
      <div class="loading-row">
        <div class="spinner-dark"></div>
        <span style="font-size:13px; color: var(--text-muted);" id="cu-loading-text">Buscando tareas en ClickUp...</span>
      </div>
    </div>

    <div class="card hidden" id="tasks-card">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
        <div class="label" id="tasks-title">Tareas encontradas</div>
        <div style="font-size:12px; color:var(--text-muted);" id="tasks-count"></div>
      </div>
      <div id="tasks-container"></div>
    </div>
  </div>

</div>
<script>
// --- Tab switching ---
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'ticket') || (i === 1 && tab === 'clickup')));
  document.getElementById('panel-ticket').classList.toggle('active', tab === 'ticket');
  document.getElementById('panel-clickup').classList.toggle('active', tab === 'clickup');
}

// --- Ticket analysis ---
const LOADING = ["Analizando el mensaje...","Consultando SOP Bible...","Evaluando nivel de riesgo...","Generando recomendación..."];
const CU_LOADING = ["Buscando tareas en ClickUp...","Consultando horas trackeadas...","Organizando resultados..."];

const SOP_LINKS = {
  "revisiones": "https://app.clickup.com/10628585/docs/a4bf9-5097/a4bf9-3537",
  "feedback": "https://app.clickup.com/10628585/docs/a4bf9-5097/a4bf9-3537",
  "entregas": "https://app.clickup.com/10628585/docs/a4bf9-5097/a4bf9-3537",
  "tiempos": "https://app.clickup.com/10628585/docs/a4bf9-5097/a4bf9-3537",
  "cancelaciones": "https://app.clickup.com/10628585/docs/a4bf9-5097/a4bf9-3537",
  "calidad": "https://app.clickup.com/10628585/docs/a4bf9-5097/a4bf9-3537",
  "comunicación": "https://app.clickup.com/10628585/docs/a4bf9-5097/a4bf9-3537",
  "onboarding": "https://app.clickup.com/10628585/docs/a4bf9-5097/a4bf9-3537",
  "escalación": "https://app.clickup.com/10628585/docs/a4bf9-5097/a4bf9-3537",
  "default": "https://app.clickup.com/10628585/docs/a4bf9-5097/a4bf9-3537"
};

function getSopLink(name) {
  const lower = name.toLowerCase();
  for (const key of Object.keys(SOP_LINKS)) { if (lower.includes(key)) return SOP_LINKS[key]; }
  return SOP_LINKS["default"];
}

const HIGH_ESC = ["raising this with","escalating","cancel","refund","devolver","reembolso","lawyer","abogado","legal","publicly","social media","redes sociales","contract","contrato","done with","fed up","had enough","this is unacceptable","not what was promised","said repeatedly","incompetent","terrible","worst","never again","going elsewhere","i want out"];
const MED_ESC = ["frustrated","disappointed","waiting too long","no response","ignored","weeks","not good enough","expected more","promised","communication","execution","match what was promised","very unhappy"];

function getEscLevel(t) {
  t = t.toLowerCase();
  const hf = HIGH_ESC.filter(k => t.includes(k));
  const mf = MED_ESC.filter(k => t.includes(k));
  if (hf.length > 0) return { level: "high", flags: hf };
  if (mf.length >= 2) return { level: "high", flags: mf };
  if (mf.length > 0) return { level: "medium", flags: mf };
  return { level: "low", flags: [] };
}

let loadingTimer;

async function analyzeTicket() {
  const ticket = document.getElementById('ticket-input').value.trim();
  if (!ticket) { alert('Pega el mensaje del cliente primero.'); return; }

  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('result-section').classList.add('hidden');
  document.getElementById('loading-card').classList.remove('hidden');

  let s = 0;
  loadingTimer = setInterval(() => { s=(s+1)%LOADING.length; document.getElementById('loading-text').textContent=LOADING[s]; }, 1400);

  const esc = getEscLevel(ticket);

  const system = `Eres el asistente interno de Edit Crew, una agencia de edición de video premium. Ayudas a los Project Managers a manejar tickets de clientes.

Devuelve un JSON con esta estructura exacta (sin markdown, sin backticks, solo JSON puro):
{
  "sops": ["nombre corto del SOP relevante 1", "nombre corto del SOP relevante 2"],
  "checklist": ["paso concreto a revisar antes de responder 1", "paso 2", "paso 3"],
  "response": "respuesta lista para enviar al cliente en inglés"
}

"sops": nombres cortos de procesos de la SOP Bible (ej: "Política de Revisiones", "Proceso de Entregas", "Manejo de Cancelaciones", "Escalación de Conflictos"). Máximo 3.
"checklist": pasos MUY concretos que el PM debe verificar ANTES de responder. Máximo 4. Ejemplos: "Revisa el historial de revisiones del cliente en ClickUp", "Confirma con el editor el status actual del proyecto", "Verifica cuántas revisiones le quedan según su paquete".
"response": en inglés, primera persona (I/we), empático y cálido, máximo 80 palabras, firma "The Edit Crew Team". Si es conflicto serio: solo validar y prometer seguimiento. Solo el texto listo para enviar.`;

  try {
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 600, system, messages: [{ role: "user", content: `Mensaje del cliente:\n"${ticket}"` }] })
    });
    const data = await res.json();
    clearInterval(loadingTimer);
    document.getElementById('loading-card').classList.add('hidden');

    if (data.error) { alert("Error: " + (data.error.message || JSON.stringify(data.error))); document.getElementById('analyze-btn').disabled=false; return; }

    let parsed;
    try { parsed = JSON.parse((data.content?.[0]?.text || "{}").replace(/```json|```/g,"").trim()); }
    catch(e) { parsed = { sops: [], checklist: [], response: data.content?.[0]?.text || "Sin respuesta." }; }

    const sb = document.getElementById('status-banner');
    const items = parsed.checklist || [];

    if (esc.level === "high") {
      sb.className = 'banner banner-danger'; sb.classList.remove('hidden');
      const steps = [...items.map(s=>`<li class="danger">${s}</li>`), `<li class="danger">Contacta al PM Lead antes de enviar cualquier respuesta</li>`].join('');
      sb.innerHTML = `<div class="banner-icon">🚨</div><div class="banner-body"><div class="banner-title danger">Riesgo alto — revisa estos pasos primero</div><ul class="steps-list">${steps}</ul><div class="banner-desc danger">Señales: ${esc.flags.join(', ')}</div></div>`;
    } else if (esc.level === "medium") {
      sb.className = 'banner banner-warning'; sb.classList.remove('hidden');
      const steps = items.map(s=>`<li class="warning">${s}</li>`).join('');
      sb.innerHTML = `<div class="banner-icon">⚠️</div><div class="banner-body"><div class="banner-title warning">Revisa estos puntos antes de enviar</div><ul class="steps-list">${steps}</ul><div class="banner-desc warning">Señales: ${esc.flags.join(', ')}</div></div>`;
    } else {
      sb.className = 'banner banner-success'; sb.classList.remove('hidden');
      const steps = items.map(s=>`<li class="info">${s}</li>`).join('');
      sb.innerHTML = `<div class="banner-icon">✓</div><div class="banner-body"><div class="banner-title success">Sin señales de riesgo</div>${items.length?`<ul class="steps-list">${steps}</ul>`:''}</div>`;
    }

    if (parsed.sops?.length) {
      const sopB = document.getElementById('sop-banner');
      sopB.className = 'banner banner-info'; sopB.classList.remove('hidden');
      const chips = parsed.sops.map(n=>`<a class="sop-link" href="${getSopLink(n)}" target="_blank">📄 ${n}</a>`).join('');
      sopB.innerHTML = `<div class="banner-icon">📚</div><div class="banner-body"><div class="banner-title info">SOPs relevantes — clic para abrir en ClickUp</div><div style="margin-top:8px;display:flex;flex-wrap:wrap;">${chips}</div></div>`;
    }

    document.getElementById('response-text').textContent = parsed.response || "";
    document.getElementById('response-card').classList.remove('hidden');
    document.getElementById('result-section').classList.remove('hidden');
    document.getElementById('analyze-btn').disabled = false;

  } catch(e) {
    clearInterval(loadingTimer);
    document.getElementById('loading-card').classList.add('hidden');
    alert("Error de conexión: " + e.message);
    document.getElementById('analyze-btn').disabled = false;
  }
}

function copyResponse() {
  navigator.clipboard.writeText(document.getElementById('response-text').textContent).then(() => {
    const b = document.getElementById('copy-btn'); b.textContent='✓ Copiado';
    setTimeout(()=>{ b.textContent='Copiar respuesta'; }, 2000);
  });
}

function resetTicket() {
  document.getElementById('ticket-input').value='';
  document.getElementById('result-section').classList.add('hidden');
  document.getElementById('status-banner').classList.add('hidden');
  document.getElementById('sop-banner').classList.add('hidden');
  document.getElementById('response-card').classList.add('hidden');
}

// --- ClickUp search ---
let cuTimer;

async function searchTasks() {
  const acronym = document.getElementById('acronym-input').value.trim().toUpperCase();
  if (!acronym) { alert('Escribe el acrónimo del cliente.'); return; }

  document.getElementById('search-btn').disabled = true;
  document.getElementById('tasks-card').classList.add('hidden');
  document.getElementById('cu-loading-card').classList.remove('hidden');

  let s = 0;
  cuTimer = setInterval(() => { s=(s+1)%CU_LOADING.length; document.getElementById('cu-loading-text').textContent=CU_LOADING[s]; }, 1500);

  try {
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "search_tasks", acronym })
    });
    const data = await res.json();
    clearInterval(cuTimer);
    document.getElementById('cu-loading-card').classList.add('hidden');

    if (data.error) { alert("Error ClickUp: " + data.error); document.getElementById('search-btn').disabled=false; return; }

    const tasks = data.tasks || [];
    document.getElementById('tasks-title').textContent = `Tareas de ${acronym}`;
    document.getElementById('tasks-count').textContent = `${tasks.length} tarea${tasks.length !== 1 ? 's' : ''} encontrada${tasks.length !== 1 ? 's' : ''}`;

    if (tasks.length === 0) {
      document.getElementById('tasks-container').innerHTML = `<div class="empty-state">No se encontraron tareas con el acrónimo <strong>${acronym}</strong></div>`;
    } else {
      const totalHours = tasks.reduce((sum, t) => sum + (parseFloat(t.hours) || 0), 0).toFixed(1);
      const rows = tasks.map(t => `
        <tr>
          <td><a class="task-link" href="${t.url}" target="_blank">${t.name}</a></td>
          <td><span class="status-pill">${t.status}</span></td>
          <td class="hours-badge">${t.hours}h</td>
          <td style="color:var(--text-muted); font-size:12px;">${t.assignees}</td>
          <td style="color:var(--text-muted); font-size:12px;">${t.due_date}</td>
        </tr>`).join('');

      document.getElementById('tasks-container').innerHTML = `
        <div style="background:var(--info-bg); border:0.5px solid var(--info-border); border-radius:var(--radius-sm); padding:10px 14px; margin-bottom:12px; font-size:13px; color:var(--info-text);">
          <strong>Total horas trackeadas:</strong> ${totalHours}h en ${tasks.length} tarea${tasks.length!==1?'s':''}
        </div>
        <table class="tasks-table">
          <thead><tr><th>Tarea</th><th>Status</th><th>Horas</th><th>Asignado</th><th>Fecha límite</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    document.getElementById('tasks-card').classList.remove('hidden');
    document.getElementById('search-btn').disabled = false;

  } catch(e) {
    clearInterval(cuTimer);
    document.getElementById('cu-loading-card').classList.add('hidden');
    alert("Error de conexión: " + e.message);
    document.getElementById('search-btn').disabled = false;
  }
}

document.getElementById('acronym-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchTasks(); });
</script>
</body>
</html>
